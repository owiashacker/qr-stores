---
deployment:
  tasks:
    # ===========================================================
    # cPanel Git Auto-Deploy Configuration
    # ===========================================================
    - export DEPLOYPATH=/home/qrstores/public_html/

    # المجلدات الرئيسية
    - /bin/cp -Rf admin $DEPLOYPATH
    - /bin/cp -Rf super $DEPLOYPATH
    - /bin/cp -Rf public $DEPLOYPATH
    - /bin/cp -Rf affiliate $DEPLOYPATH
    - /bin/cp -Rf includes $DEPLOYPATH
    - /bin/cp -Rf migrations $DEPLOYPATH
    - /bin/cp -Rf assets/css $DEPLOYPATH/assets/
    - /bin/cp -Rf assets/icons $DEPLOYPATH/assets/
    - /bin/cp -Rf assets/lib $DEPLOYPATH/assets/

    # ملفات الجذر
    - /bin/cp -f index.php $DEPLOYPATH
    - /bin/cp -f 404.php $DEPLOYPATH
    - /bin/cp -f demo.php $DEPLOYPATH
    - /bin/cp -f .htaccess $DEPLOYPATH
    - /bin/cp -f robots.txt $DEPLOYPATH
    - /bin/cp -f ads.txt $DEPLOYPATH

    # config/db.example.php (آمن) + .htaccess
    # ملاحظة: config/db.php (الحسّاس) لن يُنسخ — يبقى كما هو على السيرفر
    - /bin/cp -f config/db.example.php $DEPLOYPATH/config/db.example.php
    - /bin/cp -f config/.htaccess $DEPLOYPATH/config/.htaccess

    # ===========================================================
    # Production fixes — تعديلات خاصة بالإنتاج
    # ===========================================================
    # 1. أصلح مسارات .htaccess (احذف /qr_stores prefix)
    - /bin/sed -i 's|/qr_stores/404.php|/404.php|g' $DEPLOYPATH/.htaccess

    # 2. تأكد من صلاحيات public_html
    - /bin/chmod 755 $DEPLOYPATH
    - /bin/chmod 644 $DEPLOYPATH/.htaccess
